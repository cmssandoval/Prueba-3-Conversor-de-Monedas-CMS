<!DOCTYPE html>
<html lang="es">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">

        <title>Conversor de Monedas</title>
        <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
        <link rel="stylesheet"href="./assets/css/styles.css">
    </head>

    <body class="bg-dark text-white">
        <main class="container py-2">
                <hr class="custom-hr mx-auto mb-4">
                <h1 class="text-center my-4">Conversor de Monedas Nacional</h1>
                <hr class="custom-hr mx-auto mb-4">

            <div class="row justify-content-center">
                <div class="columna-main col-10 col-sm-8 col-md-6 col-lg-4">
                    <div class="card bg-secondary text-white p-3">
                        <div class="card-body d-flex flex-column gap-3">
                            <div>
                                <label class="form-label fw-bold d-block text-center fs-3">Pesos CLP</label>
                                <input id="inputPesos" class="form-control text-center" type="text" placeholder="Ingrese el monto en CLP">
                            </div>    
                            <div>
                                <label for="selectMoneda" class="form-label fw-bold d-block text-center fs-4">Moneda a convertir:</label>
                                <select id="selectMoneda" class="form-select text-center">
                                    <option value="">Seleccione moneda</option>
                                </select>
                            </div>

                            <button id="botonConvertir" class="btn btn-info fw-bold text-white">Convertir</button>
                            <button id="botonHistorico" class="btn btn-info fw-bold text-white">Ver últimos 10 días</button>

                            <h4 id="resultado" class="text-center mt-2">...</h4>                            
                        </div>
                    </div>
                </div>
            </div>
        </main>

        <script
            src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
            integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
            crossorigin="anonymous"
        ></script>

        <script
            src="./assets/js/scripts.js"
        ></script>
    </body>
</html>
